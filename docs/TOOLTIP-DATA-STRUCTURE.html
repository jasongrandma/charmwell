ITEM: Healing Amulet (Home Page Carousel)

DATA FIELDS STRUCTURE:
═══════════════════════════════════════════════════════════════════

1. BASIC INFORMATION
   - charm-name: String (Display name of the charm)
     Example: "Healing Amulet"

   - description: String (Full description of the item)
     Example: "Accelerates natural healing of minor wounds and bruises. The green gemstone glows softly when activated."

2. PRICING & AVAILABILITY
   - price: String/Number (Price in gold coins)
     Example: "150" or "150-200" for ranges
     Special: "Contact for Price" if custom/rare

   - stock: String (Current availability status)
     Options: "in-stock" | "low-stock" | "out-of-stock" | "pre-order"
     Example: "in-stock"

3. RARITY SYSTEM
   - rarity: String (Item rarity level)
     Options: "common" | "uncommon" | "rare" | "epic" | "legendary"
     Example: "uncommon"
     Note: Affects border color and badge display

═══════════════════════════════════════════════════════════════════

SAMPLE DATA OBJECT FOR HEALING AMULET:
═══════════════════════════════════════════════════════════════════

{
  "charmName": "Healing Amulet",
  "description": "Accelerates natural healing of minor wounds and bruises. The green gemstone glows softly when activated.",
  "price": "150",
  "stock": "in-stock",
  "rarity": "uncommon"
}

═══════════════════════════════════════════════════════════════════

HTML DATA ATTRIBUTE FORMAT:
═══════════════════════════════════════════════════════════════════

<div class="carousel-slide"
     data-charm-name="Healing Amulet"
     data-description="Accelerates natural healing of minor wounds and bruises..."
     data-price="150"
     data-stock="in-stock"
     data-rarity="uncommon">

═══════════════════════════════════════════════════════════════════

✓ data-description     [String]
✓ data-price           [String/Number]
✓ data-stock           [Enum: in-stock|low-stock|out-of-stock|pre-order]
✓ data-rarity          [Enum: common|uncommon|rare|epic|legendary]

═══════════════════════════════════════════════════════════════════

VALIDATION RULES:
═══════════════════════════════════════════════════════════════════

- Stock must match one of 4 predefined values

- Description should be concise but informative
